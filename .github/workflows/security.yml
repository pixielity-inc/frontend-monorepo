# .github/workflows/security.yml — frontend-monorepo
#
# Security scanning — weekly + on every push to main.
#
# Checks:
#   1. npm audit  — known vulnerabilities in JS dependencies
#   2. CodeQL     — static analysis for JavaScript/TypeScript

name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
