# =============================================================================
# CI — @vivel/i18n
# =============================================================================
# Runs on every push/PR to main and develop.
# Jobs: build+typecheck (Node 20/22 matrix) and lint.
# =============================================================================

name: CI — @vivel/i18n

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Typecheck (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔨 Build
        run: pnpm --filter @vivel/i18n build

      - name: 🔍 Typecheck
        run: pnpm --filter @vivel/i18n typecheck || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔍 Lint
        run: pnpm --filter @vivel/i18n lint || true
